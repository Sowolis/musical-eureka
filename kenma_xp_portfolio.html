<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kenma - Escritorio</title>
<style>
  :root{
    --tb-start:#245edb; --tb-end:#3f8cf3; --tb-shine:#7fb2ff;
    --title-start:#0a5cd1; --title-end:#3f95fb; --title-glow:#9fd0ff;
    --start-a:#3d9e1f; --start-b:#7ec850;
    --win-bg:#ece9d8; --win-border:#0047ab;
    --desk-top:#1c5cc4; --desk-mid:#4f97e0; --desk-hill1:#3f8f2e; --desk-hill2:#5cb43e; --desk-sky:#a9d6ff;
    --accent-text:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow:hidden;
    user-select:none;
  }
  #desktop{
    position:relative;
    width:100%;
    height:100vh;
    background:
      linear-gradient(to bottom, var(--desk-sky) 0%, var(--desk-sky) 45%, var(--desk-mid) 55%, var(--desk-hill2) 62%, var(--desk-hill1) 100%);
    overflow:hidden;
  }
  #desktop::before, #desktop::after{
    content:"";
    position:absolute;
    border-radius:50%;
    opacity:.55;
  }
  #desktop::before{
    width:900px;height:900px; background:var(--desk-hill2);
    left:-250px; bottom:-680px;
  }
  #desktop::after{
    width:1200px;height:1200px; background:var(--desk-hill1);
    right:-400px; bottom:-950px;
  }
  #sun{
    position:absolute; top:40px; right:80px;
    width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff9d6, #ffe066 60%, #ffd23f 100%);
    box-shadow:0 0 40px 10px rgba(255,224,102,.6);
  }
  #cloud1,#cloud2{
    position:absolute; background:#fff; border-radius:50px;
    opacity:.85; filter:blur(.5px);
  }
  #cloud1{ width:140px;height:36px; top:90px; left:120px; box-shadow: 40px -14px 0 -6px #fff, 80px 4px 0 -10px #fff;}
  #cloud2{ width:100px;height:28px; top:150px; left:60%; box-shadow: 34px -10px 0 -6px #fff;}

  .icon{
    position:absolute;
    width:80px;
    text-align:center;
    cursor:pointer;
    padding:6px;
    border-radius:3px;
  }
  .icon.selected{ background:rgba(20,80,190,.35); outline:1px dotted #cfe4ff; }
  .icon .glyph{
    width:44px;height:44px;margin:0 auto 4px;
    display:flex;align-items:center;justify-content:center;
  }
  .icon .glyph svg{ width:44px;height:44px; filter:drop-shadow(1px 2px 1px rgba(0,0,0,.4)); }
  .icon .label{
    color:#fff; font-size:11px; line-height:1.25;
    text-shadow:1px 1px 2px rgba(0,0,0,.85);
  }

  /* ---------- Windows ---------- */
  .window{
    position:absolute;
    min-width:300px;
    background:var(--win-bg);
    border:1px solid var(--win-border);
    border-radius:8px 8px 3px 3px;
    box-shadow:3px 3px 12px rgba(0,0,0,.5);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .titlebar{
    height:30px;
    background:linear-gradient(180deg, var(--title-glow) 0%, var(--title-start) 18%, var(--title-end) 60%, var(--title-start) 100%);
    display:flex; align-items:center;
    padding:2px 3px 2px 6px;
    cursor:grab;
    flex-shrink:0;
  }
  .titlebar .ttext{
    flex:1; color:#fff; font-weight:bold; font-size:13px;
    text-shadow:1px 1px 1px rgba(0,0,0,.5);
    display:flex; align-items:center; gap:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tbtns{ display:flex; gap:2px; }
  .tbtns button{
    width:22px;height:20px;
    border:1px solid rgba(255,255,255,.6);
    border-radius:3px;
    background:linear-gradient(180deg,#4f9cff,#0b5cc9);
    color:#fff; font-weight:bold; font-size:12px;
    cursor:pointer; line-height:1;
  }
  .tbtns button.close{ background:linear-gradient(180deg,#ff8a7a,#d32b1e); }
  .tbtns button:hover{ filter:brightness(1.15); }

  .menubar{
    background:#f1efe2; border-bottom:1px solid #b8b19a;
    font-size:12px; padding:2px 8px; display:flex; gap:14px; color:#333;
    flex-shrink:0;
  }
  .content{
    flex:1; overflow:auto; padding:14px; background:var(--win-bg); font-size:13px; color:#222;
  }
  .content.white{ background:#fff; }
  .statusbar{
    background:#ece9d8; border-top:1px solid #b8b19a; font-size:11px; color:#555; padding:2px 8px; flex-shrink:0;
  }

  /* ---------- Taskbar ---------- */
  #taskbar{
    position:absolute; left:0; right:0; bottom:0; height:34px;
    background:linear-gradient(180deg, var(--tb-shine) 0%, var(--tb-start) 15%, var(--tb-end) 55%, var(--tb-start) 100%);
    display:flex; align-items:center;
    border-top:1px solid #8fc0ff;
    z-index:5000;
  }
  #startbtn{
    height:100%; display:flex; align-items:center; gap:6px;
    padding:0 14px 0 8px;
    background:linear-gradient(180deg, var(--start-b), var(--start-a));
    border-radius:0 10px 10px 0;
    border-right:2px solid #1f4d13;
    color:#fff; font-weight:bold; font-style:italic; font-size:15px;
    cursor:pointer;
    text-shadow:1px 1px 1px rgba(0,0,0,.4);
  }
  #startbtn:hover{ filter:brightness(1.1); }
  #startbtn svg{ width:22px;height:22px; }
  #tasks{ flex:1; display:flex; gap:4px; padding:0 6px; height:100%; align-items:center; overflow:hidden; }
  .taskitem{
    height:24px; max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    background:linear-gradient(180deg,#5b9ef2,#1f5fc7);
    border:1px solid #164a9c; border-radius:3px; color:#fff; font-size:11px;
    display:flex; align-items:center; gap:5px; padding:0 8px; cursor:pointer;
  }
  .taskitem.active{ background:linear-gradient(180deg,#1f5fc7,#5b9ef2); box-shadow:inset 0 0 4px #000; }
  #clock{
    color:#fff; font-size:12px; padding:0 14px; border-left:1px solid #1f4d90; height:100%;
    display:flex; align-items:center; text-shadow:1px 1px 1px rgba(0,0,0,.4);
  }

  /* ---------- Start Menu ---------- */
  #startmenu{
    position:absolute; bottom:34px; left:0;
    width:290px;
    background:#fff;
    border:2px solid var(--title-start);
    border-radius:8px 8px 0 0;
    box-shadow:3px -3px 14px rgba(0,0,0,.5);
    display:none;
    z-index:6000;
    overflow:hidden;
  }
  #startmenu .userbar{
    background:linear-gradient(180deg, var(--title-glow), var(--title-start));
    padding:10px; display:flex; align-items:center; gap:10px;
  }
  #startmenu .avatar{
    width:40px;height:40px;border-radius:5px;background:#fff;border:2px solid #fff;
    display:flex;align-items:center;justify-content:center;font-size:20px;
  }
  #startmenu .uname{ color:#fff; font-weight:bold; font-size:15px; text-shadow:1px 1px 1px rgba(0,0,0,.4); }
  #startmenu .items{ padding:8px; display:flex; flex-direction:column; gap:2px;}
  #startmenu .mitem{
    display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:4px; cursor:pointer; font-size:13px; color:#1a1a1a;
  }
  #startmenu .mitem:hover{ background:#3f8cf3; color:#fff; }
  #startmenu .mitem .g{ width:24px;height:24px; display:flex; align-items:center; justify-content:center;}
  #startmenu .mitem .g svg{ width:22px;height:22px; }
  #startmenu .footer{ background:linear-gradient(180deg,#3f8cf3,#0a5cd1); padding:6px; text-align:right;}
  #startmenu .footer span{ color:#fff; font-size:11px; padding:6px 10px; cursor:pointer; border-radius:3px;}
  #startmenu .footer span:hover{ background:rgba(255,255,255,.2); }
  #startmenu hr{ border:none; border-top:1px solid #d8d8d8; margin:4px 4px; }

  /* ---------- Context menu ---------- */
  #ctxmenu{
    position:absolute; display:none; z-index:7000;
    background:#fff; border:1px solid #7c9bce; box-shadow:2px 2px 8px rgba(0,0,0,.4);
    padding:3px; min-width:170px; font-size:12px;
    border-radius:2px;
  }
  #ctxmenu .citem{ padding:6px 10px; cursor:pointer; color:#222; }
  #ctxmenu .citem:hover{ background:#3f8cf3; color:#fff; }
  #ctxmenu hr{ border:none; border-top:1px solid #ddd; margin:3px 0; }

  /* Theme swatches */
  .swatch{
    display:inline-flex; align-items:center; gap:10px; width:100%;
    padding:8px; margin-bottom:6px; border:2px solid transparent; border-radius:4px; cursor:pointer; background:#f6f5ee;
  }
  .swatch:hover{ border-color:#3f8cf3; }
  .swatch .preview{ width:60px;height:34px; border-radius:3px; border:1px solid #999; }
  .swatch.active{ border-color:#0a5cd1; background:#dbe8ff; }

  a{ color:#0a4fbf; }
  .badge{
    display:inline-block; background:#ffe066; border:1px solid #d4a70a; border-radius:3px;
    padding:1px 6px; font-size:11px; margin-left:6px;
  }
  .proj-card{
    border:1px solid #b8b19a; border-radius:6px; background:#fff; padding:12px; margin-bottom:10px;

  .proj-card h3{ margin:0 0 6px; color:#0a4fbf; }
  .tag{ display:inline-block; background:#e5efff; border:1px solid #a9c6ff; color:#0a4fbf; font-size:11px; padding:1px 6px; border-radius:8px; margin-right:4px;}
  .tiktok-btn{

  .tiktok-btn:hover{ background:#000; }

  ::-webkit-scrollbar{ width:16px; }
  ::-webkit-scrollbar-track{ background:#ece9d8; }
  ::-webkit-scrollbar-thumb{ background:linear-gradient(180deg,#8fc0ff,#3f8cf3); border:1px solid #6699cc; }
</style>

  rosa:{ '--tb-start':'#a8256f','--tb-end':'#e0559f','--tb-shine':'#ffa9d6','--title-start':'#8f1a5e','--title-end':'#d1478c','--title-glow':'#ffb6d9','--start-a':'#1f8f9e','--start-b':'#4fc7d6','--desk-mid':'#c05aa0','--desk-hill1':'#7a1f5c','--desk-hill2':'#b03f86','--desk-sky':'#ffd6ec'}
};

function applyTheme(name){
  const t = THEMES[name];
  if(!t) return;
  for(const k in t) document.documentElement.style.setProperty(k, t[k]);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active', s.dataset.theme===name));
}

function openWindow(id){
  if(openWins[id]){
    focusWindow(id);
    if(openWins[id].minimized) toggleMinimize(id);
    return;
  }
  const cfg = CONTENT[id];
  if(!cfg) return;

  const win = document.createElement('div');
  win.className = 'window';
  win.style.width = cfg.w+'px';
  win.style.height = cfg.h+'px';
  const offset = Object.keys(openWins).length * 26;
  win.style.left = (60+offset)+'px';
  win.style.top = (50+offset)+'px';
  win.style.zIndex = ++zTop;

  win.innerHTML = `
    <div class="titlebar">
      <div class="ttext">${cfg.icon} ${cfg.title}</div>
      <div class="tbtns">
        <button class="min">_</button>
        <button class="max">□</button>
        <button class="close">×</button>
      </div>
    </div>
    ${cfg.isNotepad? `<div class="menubar"><span>Archivo</span><span>Editar</span><span>Formato</span><span>Ver</span></div>` : ''}
    <div class="content ${cfg.isNotepad?'white':''}" style="${cfg.isNotepad?'font-family:Consolas,monospace;white-space:pre-wrap;':''}">${cfg.body}</div>
    <div class="statusbar">${cfg.isNotepad? 'Ln 1, Col 1' : 'Listo'}</div>
  `;
  layer.appendChild(win);

  // taskbar entry
  const taskEl = document.createElement('div');
  taskEl.className = 'taskitem active';
  taskEl.textContent = cfg.icon + ' ' + cfg.title;
  taskEl.addEventListener('click', ()=>{
    if(openWins[id].minimized){ toggleMinimize(id); focusWindow(id); }
    else if(zIsTop(win)){ toggleMinimize(id); }
    else { focusWindow(id); }
  });
  tasks.appendChild(taskEl);

  openWins[id] = { el:win, taskEl, minimized:false };

  // dragging
  const titlebar = win.querySelector('.titlebar');
  let drag=null;
  titlebar.addEventListener('mousedown', (e)=>{
    if(e.target.tagName==='BUTTON') return;
    focusWindow(id);
    drag = {sx:e.clientX, sy:e.clientY, ox:win.offsetLeft, oy:win.offsetTop};
    titlebar.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', (e)=>{
    if(!drag) return;
    win.style.left = Math.max(0, drag.ox + (e.clientX-drag.sx)) + 'px';
    win.style.top = Math.max(0, drag.oy + (e.clientY-drag.sy)) + 'px';
  });
  window.addEventListener('mouseup', ()=>{ drag=null; titlebar.style.cursor='grab'; });

  win.addEventListener('mousedown', ()=>focusWindow(id));

  win.querySelector('.close').addEventListener('click', ()=>closeWindow(id));
  win.querySelector('.min').addEventListener('click', ()=>toggleMinimize(id));
  let maxed=false, prevRect=null;
  win.querySelector('.max').addEventListener('click', ()=>{
    if(!maxed){
      prevRect = {l:win.style.left,t:win.style.top,w:win.style.width,h:win.style.height};
      win.style.left='0px'; win.style.top='0px'; win.style.width='100%'; win.style.height='calc(100% - 34px)';
      maxed=true;
    } else {
      win.style.left=prevRect.l; win.style.top=prevRect.t; win.style.width=prevRect.w; win.style.height=prevRect.h;
      maxed=false;
    }
  });

  // theme swatches wiring
  if(id==='propiedades'){
    win.querySelectorAll('.swatch').forEach(sw=>{
      sw.addEventListener('click', ()=> applyTheme(sw.dataset.theme));
    });
  }

  focusWindow(id);
}

function zIsTop(win){ return parseInt(win.style.zIndex) === zTop; }

function focusWindow(id){
  const w = openWins[id];
  if(!w) return;
  w.el.style.zIndex = ++zTop;
  w.el.style.display='flex';
  w.minimized=false;
  document.querySelectorAll('.taskitem').forEach(t=>t.classList.remove('active'));
  w.taskEl.classList.add('active');
}

function toggleMinimize(id){
  const w = openWins[id];
  if(!w) return;
  w.minimized = !w.minimized;
  w.el.style.display = w.minimized? 'none':'flex';
  w.taskEl.classList.toggle('active', !w.minimized);
}

function closeWindow(id){
  const w = openWins[id];
  if(!w) return;
  w.el.remove();
  w.taskEl.remove();
  delete openWins[id];
}

// icon interactions
document.querySelectorAll('.icon').forEach(icn=>{
  icn.addEventListener('click', (e)=>{
    document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
    icn.classList.add('selected');
  });
  icn.addEventListener('dblclick', ()=> openWindow(icn.dataset.open));
});

// start menu items also open windows
document.querySelectorAll('#startmenu .mitem').forEach(mi=>{
  mi.addEventListener('click', ()=>{
    openWindow(mi.dataset.open);
    document.getElementById('startmenu').style.display='none';
  });
});

// start button
const startmenu = document.getElementById('startmenu');
document.getElementById('startbtn').addEventListener('click', (e)=>{
  e.stopPropagation();
  startmenu.style.display = startmenu.style.display==='block' ? 'none' : 'block';
});
document.getElementById('closemenu').addEventListener('click', ()=>{ startmenu.style.display='none'; });

// deselect icons / close menus on desktop click
desktop.addEventListener('click', (e)=>{
  if(e.target===desktop){
    document.querySelectorAll('.icon').forEach(i=>i.classList.remove('selected'));
  }
  startmenu.style.display='none';
  document.getElementById('ctxmenu').style.display='none';
});

// context menu
const ctxmenu = document.getElementById('ctxmenu');
desktop.addEventListener('contextmenu', (e)=>{
  e.preventDefault();
  ctxmenu.style.left = e.clientX+'px';
  ctxmenu.style.top = e.clientY+'px';
  ctxmenu.style.display='block';
});
ctxmenu.querySelectorAll('.citem').forEach(ci=>{
  ci.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(ci.dataset.open) openWindow(ci.dataset.open);
    ctxmenu.style.display='none';
  });
});

// clock
function tick(){
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h>=12?'p.m.':'a.m.';
  h = h%12; if(h===0) h=12;
  document.getElementById('clock').textContent = `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}
tick(); setInterval(tick, 10000);

// welcome
setTimeout(()=> openWindow('about'), 500);
</script>
